type: map
mapping:
  apps:
    # app key is required, it needs to be a sequence
    required: false
    type: seq
    sequence:
      - type: map
        mapping:
          name:
            required: true
            type: str

          west-boards:
            required: true
            type: seq
            sequence:
              - type: str

          build-types:
            required: false
            type: seq
            sequence:
              - type: map
                mapping:
                  # This `type` is actual key in the east.yaml
                  type:
                    type: str
                  conf-files:
                    required: false
                    type: seq
                    sequence:
                      - type: str
                  # Dts files should be placed inside ../../boards/arm/{board}/{file}, here you just write the filename
                  dts-files:
                    required: false
                    type: seq
                    sequence:
                      - type: str

  samples:
    # samples key is optional, but it needs to be a sequence
    required: false
    type: seq
    sequence:
      - type: map
        mapping:
          name:
            required: true
            type: str

          west-boards:
            required: true
            type: seq
            sequence:
              - type: str

          inherit-build-type:
            required: false
            type: map
            mapping:
              app:
                type: str
              build-type:
                type: str
          # Dts file with same filename should be placed for all board types inside {board}/{file}
          dts-config:
            required: false
            type: seq
            sequence:
              - type: str
  version:
    type: map
    required: false
    mapping:
      paths:
        type: seq
        required: true
        sequence:
          - type: str
